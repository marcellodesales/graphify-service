name: 🐳 docker-multiarch-cicd (backend/api)
run-name: 🐳 backend/api multiarch — PR ${{ github.event.pull_request.number }} ${{ github.event.pull_request.head.sha }}

# Builds the graphify-api image (backend/api) via the shared vionix reusable
# workflow. Path-filtered so it only runs when the API component (or shared
# build inputs) change.
#
# ⚠️ Image-naming caveat: the vionix reusable workflow names images by REPO
# (ghcr.io/<owner>/<repo>), not by target-service — see the "vionix-docker-cicd"
# skill. In this monorepo, graphify-api/-cloner/-worker + the Python graphify all
# resolve to ghcr.io/marcellodesales/graphify-service and will collide until the
# reusable workflow is enhanced to append /${target-service} to the image base
# (tracked as a vionix-proj/github-platform follow-up).

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - '.github/workflows/docker-multiarch-cicd-backend.yaml'
      - 'backend/api/**'
      - 'backend/internal/**'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'docker-compose*'
      - '.dockerignore'
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths:
      - '.github/workflows/docker-multiarch-cicd-backend.yaml'
      - 'backend/api/**'
      - 'backend/internal/**'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'docker-compose*'
      - '.dockerignore'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

jobs:
  setup:
    name: 🔧 setup
    runs-on: ubuntu-latest
    outputs:
      dockerhub-token: ${{ steps.secrets.outputs.token }}
      dockerhub-username: ${{ steps.secrets.outputs.username }}
    steps:
      - name: Load secrets
        id: secrets
        run: |
          echo "username=${{ secrets.DOCKER_REGISTRY_USERNAME }}"
          echo "token=${{ secrets.DOCKER_REGISTRY_TOKEN }}"

  docker-multiarch:
    name: 🐳 docker (backend/api)
    needs: [ setup ]
    uses: vionix-proj/github-platform/.github/workflows/docker-multiarch-cicd.yaml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      pull-requests: write
    with:
      registry: ghcr.io
      platforms: linux/amd64,linux/arm64
      docker-compose-target-service: graphify-api
      # Publishes ghcr.io/<owner>/graphify-service/api (monorepo suffix).
      image-name-suffix: api
      docker-compose-file-name: docker-compose.yaml
      dockerhub-registry: docker.io
      dockerhub-namespace: ${{ github.repository_owner }}
      dockerhub-registry-username: ${{ needs.setup.outputs.dockerhub-username }}
      dockerhub-registry-token: ${{ needs.setup.outputs.dockerhub-token }}
      push-attestations: "false"
