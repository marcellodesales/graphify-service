name: 🐳 docker-multiarch-cicd (cloner)
run-name: 🐳 cloner multiarch — PR ${{ github.event.pull_request.number }} ${{ github.event.pull_request.head.sha }}

# Builds the graphify-cloner image (backend/cloner) via the shared vionix
# reusable workflow. Path-filtered to the cloner component + shared build inputs.
#
# ⚠️ Image-naming caveat: the vionix reusable workflow names images by REPO, not
# by target-service (see the "vionix-docker-cicd" skill). Distinct per-service
# images from this monorepo require enhancing the reusable workflow to append
# /${target-service} to the image base (vionix-proj/github-platform follow-up).

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - '.github/workflows/docker-multiarch-cicd-cloner.yaml'
      - 'backend/cloner/**'
      - 'backend/internal/**'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'docker-compose*'
      - '.dockerignore'
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths:
      - '.github/workflows/docker-multiarch-cicd-cloner.yaml'
      - 'backend/cloner/**'
      - 'backend/internal/**'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'docker-compose*'
      - '.dockerignore'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

jobs:
  setup:
    name: 🔧 setup
    runs-on: ubuntu-latest
    outputs:
      dockerhub-token: ${{ steps.secrets.outputs.token }}
      dockerhub-username: ${{ steps.secrets.outputs.username }}
    steps:
      - name: Load secrets
        id: secrets
        run: |
          echo "username=${{ secrets.DOCKER_REGISTRY_USERNAME }}"
          echo "token=${{ secrets.DOCKER_REGISTRY_TOKEN }}"

  docker-multiarch:
    name: 🐳 docker (cloner)
    needs: [ setup ]
    uses: vionix-proj/github-platform/.github/workflows/docker-multiarch-cicd.yaml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      pull-requests: write
    with:
      registry: ghcr.io
      platforms: linux/amd64,linux/arm64
      docker-compose-target-service: graphify-cloner
      # Publishes ghcr.io/<owner>/graphify-service/cloner (monorepo suffix).
      image-name-suffix: cloner
      docker-compose-file-name: docker-compose.yaml
      dockerhub-registry: docker.io
      dockerhub-namespace: ${{ github.repository_owner }}
      dockerhub-registry-username: ${{ needs.setup.outputs.dockerhub-username }}
      dockerhub-registry-token: ${{ needs.setup.outputs.dockerhub-token }}
      push-attestations: "false"
