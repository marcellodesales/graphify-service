# graphify-api — Go REST + MCP control plane (compose service: graphify-api).
# The only service exposed externally (via the Istio VirtualService → host
# graphify.vionix.viasat.io). Publishes clone.requested to NATS; serves status,
# artifacts, and downloads from the shared repos volume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphify-api
  namespace: graphify
  labels:
    app: graphify-api
    app.kubernetes.io/part-of: graphify-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graphify-api
  template:
    metadata:
      labels:
        app: graphify-api
        app.kubernetes.io/part-of: graphify-service
    spec:
      # uid/gid 10001 (image USER); fsGroup makes the RWX repos volume writable.
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: api
          image: ghcr.io/marcellodesales/graphify-service/api
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GRAPHIFY_ENV
              value: "production"
            - name: GRAPHIFY_HTTP_ADDR
              value: ":8080"
            - name: GRAPHIFY_REPOS_ROOT
              value: /graphify-service/repos
            - name: GRAPHIFY_LOG_LEVEL
              value: info
            - name: NATS_URL
              value: nats://nats:4222
            # Phase 1 EXPERIMENT auth posture — explicitly chosen by the operator.
            # The service refuses to start in production on a non-loopback bind with
            # AUTH_MODE=none unless this override is set. The host is internal-only
            # (internal Azure LB + VICE DNS, VPN-reachable). Hardening to
            # oauth2-proxy / static-token auth is the immediate next step — see the
            # env README ("Security posture" + "Next steps").
            - name: GRAPHIFY_AUTH_MODE
              value: none
            - name: GRAPHIFY_INSECURE_ALLOW_NO_AUTH
              value: "1"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: repos
              mountPath: /graphify-service/repos
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
      volumes:
        - name: repos
          persistentVolumeClaim:
            claimName: graphify-repos
