# ClusterIP fronting graphify-api. The Istio VirtualService routes
# graphify.vionix.viasat.io → graphify-api.graphify.svc.cluster.local:8080.
apiVersion: v1
kind: Service
metadata:
  name: graphify-api
  namespace: graphify
  labels:
    app: graphify-api
    app.kubernetes.io/part-of: graphify-service
spec:
  type: ClusterIP
  selector:
    app: graphify-api
  ports:
    - name: http
      port: 8080
      targetPort: http
