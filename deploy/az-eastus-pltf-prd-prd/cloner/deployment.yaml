# graphify-cloner — NATS-driven clone worker (compose service: graphify-cloner).
# Consumes clone.requested, performs a secure shallow clone into the shared repos
# volume, publishes cloned. Long-running (subscribes + serves the status protocol
# on :8080). Not exposed externally.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphify-cloner
  namespace: graphify
  labels:
    app: graphify-cloner
    app.kubernetes.io/part-of: graphify-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graphify-cloner
  template:
    metadata:
      labels:
        app: graphify-cloner
        app.kubernetes.io/part-of: graphify-service
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: cloner
          image: ghcr.io/marcellodesales/graphify-service/cloner
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GRAPHIFY_ENV
              value: "production"
            - name: GRAPHIFY_HTTP_ADDR
              value: ":8080"
            - name: GRAPHIFY_REPOS_ROOT
              value: /graphify-service/repos
            - name: GRAPHIFY_LOG_LEVEL
              value: info
            - name: NATS_URL
              value: nats://nats:4222
            # See api/deployment.yaml — shared config guard; experiment posture.
            - name: GRAPHIFY_AUTH_MODE
              value: none
            - name: GRAPHIFY_INSECURE_ALLOW_NO_AUTH
              value: "1"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: repos
              mountPath: /graphify-service/repos
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
      volumes:
        - name: repos
          persistentVolumeClaim:
            claimName: graphify-repos
