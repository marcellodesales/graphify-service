# ClusterIP for the cloner status protocol (/healthz, /readyz, /status/{id}).
# Internal only — used for debugging and future status fan-out.
apiVersion: v1
kind: Service
metadata:
  name: graphify-cloner
  namespace: graphify
  labels:
    app: graphify-cloner
    app.kubernetes.io/part-of: graphify-service
spec:
  type: ClusterIP
  selector:
    app: graphify-cloner
  ports:
    - name: http
      port: 8080
      targetPort: http
