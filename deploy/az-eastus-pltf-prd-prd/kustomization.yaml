apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

###
### graphify-service — az-eastus prod overlay for https://graphify.vionix.viasat.io
###
### Mirrors the full docker-compose.yaml stack (nats + graphify-api + cloner +
### worker) on the Vionix platform cluster. Neo4j/Graphiti are a documented next
### phase (see README "Next steps"), not deployed here.
###
### Component dirs are listed in cold-cluster apply order:
###   namespace → storage → nats → api → cloner → worker → istio
###
### Build / apply (no ArgoCD on this cluster yet — manual, per the GitOps
### guardrail; a human applies, nothing auto-reconciles):
###   kustomize build deploy/az-eastus-pltf-prd-prd | \
###     kubectl apply --server-side --field-manager=kustomize -f -
###   # re-run once to clear the first-pass CRD/Certificate race.
###
### There is NO top-level `namespace:` — the istio layer intentionally spans
### istio-system (Certificate) + graphify (Gateway/VirtualService).
###

resources:
  - namespace
  - storage
  - nats
  - api
  - cloner
  - worker
  - istio

###
### Images: every image is pulled through a Viasat Artifactory proxy (public
### egress is blocked on nodes) and pinned. Update `newTag` to the CI-published
### tag on merge (kustomize rewrites in one place).
###   ghcr.io/*      → remote-ghcr.docker.artifactory.viasat.com/*
###   docker.io/*    → dockerhub-oci.docker.artifactory.viasat.com/*  (no /library/)
###
images:
  - name: ghcr.io/marcellodesales/graphify-service/api
    newName: remote-ghcr.docker.artifactory.viasat.com/marcellodesales/graphify-service/api
    newTag: main-6b472f4
  - name: ghcr.io/marcellodesales/graphify-service/cloner
    newName: remote-ghcr.docker.artifactory.viasat.com/marcellodesales/graphify-service/cloner
    newTag: main-6b472f4
  - name: ghcr.io/marcellodesales/graphify-service/worker
    newName: remote-ghcr.docker.artifactory.viasat.com/marcellodesales/graphify-service/worker
    newTag: main-6b472f4
  - name: nats
    newName: dockerhub-oci.docker.artifactory.viasat.com/nats
    newTag: 2.10.22-alpine
