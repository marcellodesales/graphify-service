# Headless Service so the StatefulSet pod is addressable as nats.graphify.svc.
# All backend services connect via NATS_URL=nats://nats:4222.
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: graphify
  labels:
    app: nats
    app.kubernetes.io/part-of: graphify-service
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: monitor
      port: 8222
      targetPort: monitor
