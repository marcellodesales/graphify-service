# graphify-worker — NATS-driven graphify worker (compose service: graphify-worker).
# Consumes cloned, runs `graphify extract --code-only` + enrich into the shared
# repos volume, publishes graph.ready. Long-running (subscribes + status on :8080).
#
# NOTE (documented gap): the worker image is built FROM the graphify base image
# (marcellodesales/graphify). If CI built it FROM the stale Docker Hub :latest,
# `graphify extract` may be missing/older. To fully work in k8s, the worker image
# must be built FROM a fresh graphify base (publish it to GHCR and pass
# GRAPHIFY_IMAGE at build). See the env README ("compose ↔ k8s gaps").
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphify-worker
  namespace: graphify
  labels:
    app: graphify-worker
    app.kubernetes.io/part-of: graphify-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graphify-worker
  template:
    metadata:
      labels:
        app: graphify-worker
        app.kubernetes.io/part-of: graphify-service
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: worker
          image: ghcr.io/marcellodesales/graphify-service/worker
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GRAPHIFY_ENV
              value: "production"
            - name: GRAPHIFY_HTTP_ADDR
              value: ":8080"
            - name: GRAPHIFY_REPOS_ROOT
              value: /graphify-service/repos
            - name: GRAPHIFY_CODE_ONLY
              value: "true"
            - name: GRAPHIFY_LOG_LEVEL
              value: info
            - name: NATS_URL
              value: nats://nats:4222
            # See api/deployment.yaml — shared config guard; experiment posture.
            - name: GRAPHIFY_AUTH_MODE
              value: none
            - name: GRAPHIFY_INSECURE_ALLOW_NO_AUTH
              value: "1"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: repos
              mountPath: /graphify-service/repos
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: "2", memory: 2Gi }
      volumes:
        - name: repos
          persistentVolumeClaim:
            claimName: graphify-repos
